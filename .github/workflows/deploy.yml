name: Build and Deploy
on:
    workflow_dispatch:
    push:
    
    pull_request:
        branches:
            - main
    
jobs: 
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v5
            - name: Setup node
              uses: actions/setup-node@v3
              with:
                node-version: 22.22.x
                cache: npm
            - name: Install npm module
              run: npm install
            - name : Run unit test with mocha
              run: npm run mocha:test
            - name: Run linter with eslint
              run: npm run eslint:check
              continue-on-error : true
            
            - name: Run functionnal test with cypress
              run : npm run cypress:run
            - name: Install playwright for functional test
              run : npx playwright install
            - name: Run functionnal test with cypress
              run : npm run playwright:run
              
            - name: Do an audit of the installation
              run: npm audit
              continue-on-error : true
            - name: Build the project and do a summary
              run: npm run build |
                  echo "## Build Results" >> $GITHUB_STEP_SUMMARY
                  echo "Build completed successfully at $(date)" >> $GITHUB_STEP_SUMMARY

