name: Build and Deploy
on:
    workflow_dispatch:
    push:
    
    pull_request:
        branches:
            - main
    
jobs: 
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v5
            - name: Setup node
              uses: actions/setup-node@v3
              with:
                node-version: 22.22.x
                cache: npm
            - name: Install npm module
              run: npm install
            - name : Run unit test with mocha
              run: npm run mocha:test
            - name: Run linter with eslint
              run: npm run eslint:check
              continue-on-error : true
            
            - name: Run functionnal test with cypress
              run : npm run cypress:run
            - name: Install playwright for functional test
              run : npx playwright install
            - name: Run functionnal test with cypress
              run : npm run playwright:run
              
            - name: Do an audit of the installation
              run: npm audit
              continue-on-error : true
            - name: Build the project and do a summary
              run: npm run build |
                  echo "## Build Results" >> $GITHUB_STEP_SUMMARY |
                  echo "Build completed successfully at $(date)" >> $GITHUB_STEP_SUMMARY
    deploy-docker:
      needs: build-and-deploy
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6

        - name: Login to GitHub container Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor}}
            password: ${{ secrets.GITHUB_TOKEN}}
        
        - name: Lowercase repo holder
          run : |
            echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}
        
        - name: Build and push
          uses: docker/build-push-action@v7
          with:
            context: .
            push: true
            tags: ghcr.io/${{ env.REPO_OWNER }}/TWOSHIP:latest